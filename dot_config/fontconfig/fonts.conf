<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>

  <!--
    ========== TIER 4 — SF PRO FONT ==========
    Dipasang 2026-06-25.
    Backup font sebelumnya: ~/Backup/font-backup-2026-06-25/
    Restore: sudo bash ~/Backup/font-backup-2026-06-25/restore-font.sh
  -->

  <!-- Global rendering hints (sama seperti sebelumnya) -->
  <match target="font">
    <edit name="antialias" mode="assign"><bool>true</bool></edit>
    <edit name="hinting" mode="assign"><bool>true</bool></edit>
    <edit name="hintstyle" mode="assign"><const>hintfull</const></edit>
    <edit name="rgba" mode="assign"><const>rgb</const></edit>
    <edit name="lcdfilter" mode="assign"><const>lcddefault</const></edit>
  </match>

  <match target="font">
    <edit name="embeddedbitmap" mode="assign"><bool>false</bool></edit>
  </match>

  <!-- Sans-serif → SF Pro Display (default UI) -->
  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>SF Pro Display</family>
      <family>SF Pro Text</family>
      <family>SF Pro</family>
      <family>Segoe UI Variable Static Text</family>
      <family>Segoe UI</family>
      <family>Arial</family>
      <family>Noto Sans</family>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>

  <!-- Emoji fallback -->
  <match target="pattern">
    <or>
      <test name="family" qual="any"><string>SF Pro Display</string></test>
      <test name="family" qual="any"><string>SF Pro Text</string></test>
      <test name="family" qual="any"><string>SF Pro</string></test>
      <test name="family" qual="any"><string>Segoe UI Variable Static Text</string></test>
      <test name="family" qual="any"><string>Segoe UI</string></test>
      <test name="family" qual="any"><string>Arial</string></test>
      <test name="family" qual="any"><string>Noto Sans</string></test>
    </or>
    <edit name="family" mode="append">
      <string>Noto Color Emoji</string>
    </edit>
  </match>

  <!-- Serif → Times New Roman (sama seperti sebelumnya) -->
  <alias>
    <family>serif</family>
    <prefer>
      <family>Times New Roman</family>
      <family>Noto Serif</family>
    </prefer>
  </alias>

  <!-- Monospace → SF Mono + Nerd Font + fallback -->
  <alias>
    <family>monospace</family>
    <prefer>
      <family>SF Mono</family>
      <family>JetBrainsMono Nerd Font</family>
      <family>Maple Mono NF</family>
      <family>Consolas</family>
      <family>Cascadia Code</family>
      <family>JetBrains Mono</family>
      <family>Liberation Mono</family>
      <family>Noto Sans Mono</family>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias></fontconfig>
