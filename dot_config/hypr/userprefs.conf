# в–Ҳв–„в–ҲвҖғв–„в–ҲвҖғв–Ҳв–Ҳв–„вҖғв–Ҳв–Җв–„вҖғ вҖғв–Ҳв–Җв–ҖвҖғв–Ҳв–Җв–„вҖғв–Ҳв–Ҳв–„вҖғв–Ҳв–Җв–‘вҖғв–„в–Ҳ

# Set your personal hyprland configuration here
# See https://wiki.hyprland.org/Configuring for more information

# // в–ҲвҖғв–Ҳв–„в–‘в–ҲвҖғв–Ҳв–Җв–ҲвҖғв–Ҳв–‘в–ҲвҖғв–Җв–Ҳв–Җ
# // в–ҲвҖғв–Ҳв–‘в–Җв–ҲвҖғв–Ҳв–Җв–ҖвҖғв–Ҳв–„в–ҲвҖғв–‘в–Ҳв–‘


# в”Җв”Җв”Җ Input (mouse & keyboard tweaks) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
#  Uncomment to enable // change to a preferred value
input {
    # kb_layout = us
    follow_mouse = 1           # focus follows mouse (sangat berguna untuk dev)
    sensitivity = 0            # neutral mouse sensitivity
    # force_no_accel = 0
    # accel_profile = flat 
    # numlock_by_default = true

    # Touchpad
    touchpad {
        natural_scroll = yes
        # tap-to-click untuk touchpad
        tap-to-click = true
    }
}

# в”Җв”Җв”Җ Gestures (touchpad multi-finger) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# Disabled: workspace_swipe_fingers not available in Hyprland 0.55.2
# Aktifkan manual jika touchpad support dan Hyprland > 0.55.2
# gestures {
#     workspace_swipe = true
#     workspace_swipe_fingers = 3
# }

# в”Җв”Җв”Җ Misc в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
misc {
    allow_session_lock_restore = true   # restore session setelah unlock
    disable_hyprland_logo = true        # sembunyikan splash logo
    # enable_swallow = true             # window swallow seperti devour (uncomment jika perlu)
}

# в”Җв”Җв”Җ Ecosystem в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
ecosystem {
  no_update_news = true                 # disable first-launch update popup
}

# в”Җв”Җв”Җ General в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
general {
    layout = dwindle
    no_focus_fallback = true            # tidak pindah focus saat window tutup
    allow_tearing = false               # stabilitas > sedikit fps (untuk non-gaming)
    gaps_in = 5                         # inner gaps
    gaps_out = 10                       # outer gaps
    border_size = 2                     # border tipis, ringan
    # col.active_border = rgba(33ccffee)  # warna border bisa di-uncomment
    # col.inactive_border = rgba(595959aa)
}

# в”Җв”Җв”Җ Dwindle layout (smart split) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
dwindle {
    preserve_split = true               # pertahankan split direction
    smart_split = true                  # AUTO: 3-pane jadi optimal
    # no_gaps_when_only = false         # deprecated di Hyprland 0.55+
    # special_scale_factor = 0.8        # scale untuk special workspace (scratchpad)
}

# в”Җв”Җв”Җ Autostart (reliable order) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# Catatan: Urutan penting! Daemon yang depend di GPU (swaync, swayosd, hyprpaper)
# harus start SETELAH compositor siap. Wallpaper daemon (awww) prioritas utama
# agar tidak ada layar hitam saat boot.
#
# vicinae: ON (auto-start via exec-once).

# 0. Self-heal: cegah duplikat hypridle saat Hyprland restart
#    Bunuh orphan + respawn. exec = jalan setiap config load.
exec = pkill -x hypridle 2>/dev/null; hypridle &

# 1. swww-daemon (HyDE default backend, animated wallpaper)
exec-once = awww-daemon
# 2. Wallpaper (legacy fallback, disabled вҖ” pakai swww di atas)
# 1. Wallpaper вҖ” start paling awal, fallback berlapis
#    awww (animated) + hyprpaper (static) sebagai backup
# exec-once = pkill awww-daemon 2>/dev/null; awww-daemon  # disabled вҖ” pakai swww
# exec-once = hyprpaper &  # disabled вҖ” pakai swww

# 2. Lock screen (siap untuk locking)
exec-once = hyprlock

# 3. Compositor helpers
exec-once = hyprswitch init --show-title --size-factor 4 --workspaces-per-row 5 &  # was 6, turun

# 4. Stop Dunst (jika ada konflik dengan swaync)
exec-once = pkill dunst 2>/dev/null

# 5. SwayNC (notifications)
exec-once = swaync

# 6. SwayOSD (volume/brightness OSD)
exec-once = swayosd-server

# 7. Power profiles (Dell ACPI вҖ” handled by kernel, no daemon needed)
# Profile switcher: /usr/local/bin/cycle-power-profile

# 8. Hyprsunset (night light) вҖ” auto-start dengan filter 4500K
exec-once = hyprctl hyprsunset temperature 4500


# 9. Vicinae (launcher)
exec-once = vicinae server &

# в”Җв”Җв”Җ Environment в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# Qt apps (Feishin, dll) pakai tema GTK, tidak putih sendiri
env = QT_QPA_PLATFORMTHEME,gtk3
